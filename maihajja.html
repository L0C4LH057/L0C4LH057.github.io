            { category: 'Operations', title: 'Payroll Management', icon: `<path d="M12 22c-5.523 0-10-4.477-10-10S6.477 2 12 2s10 4.477 10 10-4.477 10-10 10zM8 10h8m-8 4h8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>`, demoTitle: 'Monthly Pay Slip Preview', demoContent: `<div class="p-4 bg-yellow-50 rounded-lg"><p class="text-sm font-semibold mb-2 text-accent-yellow">Sample Pay Slip (Simulation)</p><div class="bg-white p-3 rounded-md shadow-md text-xs space-y-1"><div class="flex justify-between border-b pb-1"><span>**Gross Salary:**</span> <span>N80,000</span></div><div class="flex justify-between"><span>- Deductions (Absence):</span> <span class="text-red-600">N2,500</span></div><div class="flex justify-between border-t mt-1 pt-1 font-bold"><span>Net Pay:</span> <span>N77,500</span></div></div><p class="mt-4 text-xs text-gray-600">Automated salary and deduction calculations, leveraging attendance and worker data to generate accurate pay slips monthly.</p></div>` },
            { category: 'Operations', title: 'Production Management & Tracking', icon: `<path d="M12 18v-6m0 0V6m0 6h6m-6 0H6M2 12h20M7 7h10M5 17h14M22 5v14a2 2 0 01-2 2H4a2 2 0 01-2-2V5a2 2 0 012-2h16a2 2 0 012 2z" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>`, demoTitle: 'Factory Batch Tracking', demoContent: `<div class="p-4 bg-yellow-50 rounded-lg"><p class="text-sm font-semibold mb-2 text-accent-yellow">Active Batch Status (Simulation)</p><div class="bg-white p-3 rounded-md shadow-md text-sm"><p class="font-bold">Batch #20240925-A</p><p class="text-xs text-gray-600 mt-1">Product: Maize Flour | Status: **Milling (85% Complete)**</p><div class="w-full bg-gray-200 rounded-full h-2.5 mt-2"><div class="bg-accent-yellow h-2.5 rounded-full" style="width: 85%"></div></div><p class="text-xs text-right text-gray-500 mt-1">Est. Completion: 2 hours</p></div><p class="mt-4 text-xs text-gray-600">Track raw material consumption, processing time, and output yield for every production run in the factory.</p></div>` },
            { category: 'Operations', title: 'Raw Material & Finished Goods Inventory', icon: `<path d="M21 11.5a2.5 2.5 0 00-5 0v3.5h-2v-3.5a2.5 2.5 0 00-5 0v3.5H7v-3.5a2.5 2.5 0 00-5 0v10a2 2 0 002 2h18a2 2 0 002-2v-10zM12 18h.01M16 18h.01" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>`, demoTitle: 'Inventory Stock Levels', demoContent: `<div class="p-4 bg-yellow-50 rounded-lg"><p class="text-sm font-semibold mb-2 text-accent-yellow">Current Stock Alerts (Simulation)</p><div class="text-xs space-y-1"><p class="p-2 bg-white rounded-md shadow-sm border border-gray-100 flex justify-between"><span>**Raw Maize (Factory)**</span> <span><span class="text-red-600 font-bold">LOW (15 Tons)</span></span></p><p class="p-2 bg-white rounded-md shadow-sm border border-gray-100 flex justify-between"><span>**Flour (Branch 2)**</span> <span>Adequate (200 Bags)</span></p></div><p class="mt-4 text-xs text-gray-600">Track real-time stock levels of raw materials (e.g., grain) and finished products (e.g., packaged flour) with automatic low-stock alerts.</p></div>` },
            { category: 'Operations', title: 'Fixed Asset Management (Machinery & Depreciation)', icon: `<path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><path d="M16 11l-4 4-4-4" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>`, demoTitle: 'Asset Maintenance Schedule', demoContent: `<div class="p-4 bg-yellow-50 rounded-lg"><p class="text-sm font-semibold mb-2 text-accent-yellow">Upcoming Maintenance (Simulation)</p><div class="text-xs space-y-1"><p class="p-2 bg-white rounded-md shadow-sm border border-gray-100 flex justify-between"><span>**Asset:** Grinding Mill Unit 1</span> <span>**Next Service:** 2024-10-15</span></p><p class="p-2 bg-white rounded-md shadow-sm border border-gray-100 flex justify-between"><span>**Asset:** Diesel Generator</span> <span>**Next Service:** 2024-11-01</span></p></div><p class="mt-4 text-xs text-gray-600">Track asset lifespan, maintenance history, and automate depreciation calculations for accurate financial reporting.</p></div>` },

        // Function to open the modal
        function openModal(feature) {
            const modal = document.getElementById('feature-modal');
            const titleEl = document.getElementById('modal-title');
            const categoryEl = document.getElementById('modal-category');
            const contentEl = document.getElementById('modal-content');
            const colorClass = feature.category === 'Finance' ? 'text-primary-green' : (feature.category === 'Sales' ? 'text-secondary-blue' : 'text-accent-yellow');

            titleEl.textContent = feature.demoTitle;
            categoryEl.textContent = feature.category + ' Feature Demo';
            categoryEl.className = `text-sm font-medium ${colorClass} mb-2`;
            contentEl.innerHTML = feature.demoContent;
            modal.classList.remove('hidden');
        }

        // Function to close the modal
        function closeModal() {
            document.getElementById('feature-modal').classList.add('hidden');
        }

        // Function to generate the HTML for a single feature
        function createFeatureListItem(feature, index) {
            const categoryColor = feature.category === 'Finance' ? 'primary-green' : (feature.category === 'Sales' ? 'secondary-blue' : 'accent-yellow');
            const shadowHover = feature.category === 'Finance' ? 'hover:shadow-primary-green/40' : (feature.category === 'Sales' ? 'hover:shadow-secondary-blue/40' : 'hover:shadow-accent-yellow/40');

            const li = document.createElement('li');
            li.className = `feature-item flex items-start text-gray-700 bg-white p-3 rounded-lg shadow-sm border border-gray-100 ${shadowHover}`;
            li.onclick = () => openModal(feature);

            const iconSvg = `<svg class="w-5 h-5 mt-1 mr-3 text-${categoryColor} flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">${feature.icon}</svg>`;
            
            li.innerHTML = `${iconSvg}<span class="font-medium text-sm leading-tight">${feature.title}</span>`;
            
            return li;
        }

        // Function to group and render all features
        function renderFeatures() {
            const categories = {
                'Finance': [],
                'Sales': [],
                'Operations': []
            };

            featureData.forEach(feature => {
                if (categories[feature.category]) {
                    categories[feature.category].push(feature);
                }
            });

            // Render Finance
            const financeList = document.getElementById('finance-list');
            categories['Finance'].forEach((f, i) => financeList.appendChild(createFeatureListItem(f, i)));

            // Render Operations
            const operationsList = document.getElementById('operations-list');
